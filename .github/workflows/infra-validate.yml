name: Validate Infrastructure

on:
  push:
    branches:
      - main
      - develop
      - CI/CD
  pull_request:
    branches:
      - main
      - develop

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0
    
    - name: Terraform Format Check
      run: terraform fmt -check -recursive Terraform/ || true
    
    - name: Terraform Init
      run: cd Terraform && terraform init -backend=false || true
    
    - name: Terraform Validate
      run: cd Terraform && terraform validate || true

  helm-validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
    
    - name: Helm Lint
      run: helm lint helm-statuspage/ || true
    
    - name: Helm Template
      run: helm template my-statuspage helm-statuspage/ --debug || true

  summary:
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Summary
      run: echo "✅ Infrastructure Validation Complete!"
