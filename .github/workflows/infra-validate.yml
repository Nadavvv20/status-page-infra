name: Validate Infrastructure

on:
  push:
    branches:
      - main
      - develop
      - CI/CD
    paths:
      - 'Terraform/**'
      - 'helm-statuspage/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'Terraform/**'
      - 'helm-statuspage/**'

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0
    
    - name: Terraform Format Check
      run: terraform fmt -check -recursive Terraform/
      continue-on-error: true
    
    - name: Terraform Init
      run: |
        cd Terraform
        terraform init -backend=false
      continue-on-error: true
    
    - name: Terraform Validate
      run: |
        cd Terraform
        terraform validate
      continue-on-error: true

  helm-validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'
    
    - name: Helm Lint
      run: helm lint helm-statuspage/
      continue-on-error: true
    
    - name: Helm Template
      run: helm template my-statuspage helm-statuspage/ --debug
      continue-on-error: true

  summary:
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Infrastructure Validation Summary
      run: |
        echo "✅ Infrastructure Validation Complete!"