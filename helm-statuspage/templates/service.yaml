apiVersion: v1
kind: Service
metadata:
  name: {{ include "statuspage.fullname" . }}-web
  labels:
    {{- include "statuspage.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: {{ include "statuspage.fullname" . }}-web